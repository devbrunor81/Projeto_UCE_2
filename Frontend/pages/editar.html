

<link rel="stylesheet" href="../css/items.css">

<div class="form-container">

   <div class="form-card">

      <h2>Editar Item</h2>

      <form id="editarForm">
         <!-- Campos TEXTO -->
         <div class="form-group">
            <label>Nome do item:</label>
            <input type="text" id="nome" class="form-input" required>
         </div>

         <div class="form-group">
            <label>Local de encontro:</label>
            <input type="text" id="local_encontro" class="form-input" required>
         </div>

         <div class="form-group">
            <label>Descrição:</label>
            <textarea id="descricao" class="form-input" rows="3"></textarea>
         </div>

         <div class="form-group">
            <label>Categoria</label>

            <select id="categoria" class="form-input" required>
               <option value="">Selecione</option>
               <option value="acessorio">Acessório</option>
               <option value="eletronico">Eletrônico</option>
               <option value="documento">Documento</option>
               <option value="roupas_calcados">Roupa/Calçado</option>
               <option value="outros">Outros</option>
            </select>
         </div>

         <!-- Campo DATA -->
         <div class="form-group">
            <label>Data de encontro</label>
            <input type="date" id="data_encontro" class="form-input" required>
         </div>

         <!-- Campo FOTO -->
         <div class="form-group">
            <label>Fotos do item</label>

            <input type="file" id="fotoInput" accept="image/*" multiple>

            <div id="previewContainer" style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;">
               <!-- Imagens atuais serão inseridas aqui -->
            </div>
         </div>

         <button type="submit" class="primary-btn">Confirmar Edição</button>
         <button type="button" class="secondary-btn" onclick="history.back()" style="margin-left: 10px;">Cancelar</button>
      </form>

   </div>

</div>
