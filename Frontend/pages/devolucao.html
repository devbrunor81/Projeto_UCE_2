<link rel="stylesheet" href="../css/items.css">

<div class="form-container">

    <div class="form-card">

      <h2>Registrar Devolução</h2>

        <!-- DATA -->
        <div class="form-group">
            <label>Data de devolução</label>
            <input type="date" class="form-input" id="dataDevolucao">
        </div>

        <!-- NOME -->
        <div class="form-group">
            <label>Nome do resgatante</label>
            <input type="text" class="form-input" id="nomeResgatante">
        </div>

        <!-- TELEFONE -->
        <div class="form-group">
            <label>Telefone do resgatante</label>
            <input type="text" class="form-input" id="telefone">
        </div>

        <!-- TIPO -->
        <div class="form-group">
            <label>Tipo de resgatante</label>

            <select class="form-input" id="tipoResgatante">
                <option value="">Selecione</option>
                <option>Aluno</option>
                <option>Professor</option>
                <option>Administração</option>
              <option>Outro</option>
            </select>
        </div>

        <button class="primary-btn" type="submit">
            Confirmar Devolução
        </button>
    </div>
</div>
